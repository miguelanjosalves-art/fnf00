<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">

<title>Ultimate Rhythm Engine</title>

<style>

body{
    background:#0a0a0a;
    color:white;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    margin:0;
    padding:20px;
    overflow:hidden;
}

#controls-sidebar{
    width:260px;
    padding:20px;
    border-right:3px solid #444;
    background:#111;
}

#game-container{
    position:relative;
    width:500px;
    height:700px;
    background:linear-gradient(
        to bottom,
        #111,
        #000
    );
    overflow:hidden;
    margin-left:20px;
    border:5px solid #333;
}

.receptor{
    width:70px;
    height:25px;
    position:absolute;
    bottom:40px;
    border-radius:12px;
    border:3px solid white;
}

#rect-left{
    background:#00ff00;
    border-color:#00ff00;
    box-shadow:0 0 20px #00ff00;
}

#rect-down{
    background:#ff0000;
    border-color:#ff0000;
    box-shadow:0 0 20px #ff0000;
}

#rect-up{
    background:#ffff00;
    border-color:#ffff00;
    box-shadow:0 0 20px #ffff00;
}

#rect-right{
    background:#0000ff;
    border-color:#0000ff;
    box-shadow:0 0 20px #0000ff;
}

#rect-space{
    background:#ff8800;
    border-color:#ff8800;
    box-shadow:0 0 20px #ff8800;
}

.note{
    position:absolute;
    width:70px;
    height:22px;
    border-radius:10px;
}

.active{
    transform:scale(1.15);
    filter:brightness(1.5);
}

#judge-text{
    position:absolute;
    top:250px;
    left:50%;
    transform:translateX(-50%);
    font-size:50px;
    font-weight:bold;
    opacity:0;
    transition:0.15s;
    z-index:50;
}

#health-container{
    position:absolute;
    top:10px;
    left:10px;
    width:470px;
    height:25px;
    border:2px solid white;
    background:#222;
}

#health-bar{
    width:100%;
    height:100%;
    background:linear-gradient(
        90deg,
        lime,
        yellow,
        red
    );
}

button,
select,
input{
    background:#1a1a1a;
    color:white;
    border:2px solid #666;
    padding:8px;
}

#game-over{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

</style>

</head>

<body>

<div id="controls-sidebar">

<h2>CONTROLES</h2>

<label>Esquerda</label>
<input type="text" id="key-left">

<br><br>

<label>Baixo</label>
<input type="text" id="key-down">

<br><br>

<label>Cima</label>
<input type="text" id="key-up">

<br><br>

<label>Direita</label>
<input type="text" id="key-right">

<br><br>

<label>Espaço</label>
<input type="text" id="key-space">

<br><br>

<button onclick="saveControls()">
SALVAR
</button>

<br><br>

<select id="difficulty-select">

<option value="easy">
Fácil
</option>

<option value="medium">
Médio
</option>

<option value="hard" selected>
Difícil
</option>

<option value="extreme">
Extremo
</option>

</select>

<br><br>

<select id="category-select">

<option value="undertale">
Undertale
</option>

<option value="deltarune">
Deltarune
</option>

<option value="forsaken">
Forsaken
</option>

<option value="fnf">
FNF
</option>

</select>

<br><br>

<select id="song-select"></select>

<br><br>

<button onclick="startGame()">
INICIAR
</button>

</div>

<div id="game-container">

<div id="health-container">
<div id="health-bar"></div>
</div>

<div id="judge-text"></div>

<div class="receptor"
id="rect-left"
style="left:20px;">
</div>

<div class="receptor"
id="rect-down"
style="left:120px;">
</div>

<div class="receptor"
id="rect-up"
style="left:220px;">
</div>

<div class="receptor"
id="rect-right"
style="left:320px;">
</div>

<div class="receptor"
id="rect-space"
style="
left:420px;
display:none;
">
</div>

<div id="game-over">

<h1 style="
font-size:60px;
color:red;
">
GAME OVER
</h1>

<button
onclick="location.reload()">

REINICIAR

</button>

</div>

</div>

<div id="youtube-player"
style="display:none;">
</div>

<script>

const tag =
document.createElement('script');

tag.src =
"https://www.youtube.com/iframe_api";

document.head.appendChild(tag);

let player;

let gameRunning = false;

let chart = [];

let visualTime = 0;

let health = 100;

let selectedSong = null;

let difficulty = "hard";

let musicStarted = false;

const songDatabase = {

undertale:[

{
name:"MEGALOVANIA",
id:"0FCvzsVlXpQ"
},

{
name:"Hopes And Dreams",
id:"wbO3p7_Mf30"
}

],

deltarune:[

{
name:"BIG SHOT",
id:"V31PVkwzpEY"
},

{
name:"Attack Of The Killer Queen",
id:"XR2QQMfeJbg"
}

],

forsaken:[

{
name:"Forsaken Theme",
id:"s_eDrqnHQAw"
}

],

fnf:[

{
name:"Accelerant",
id:"ttfFKfTa6gM"
},

{
name:"Triple Trouble",
id:"PmXruhDoDuw"
}

]

};

let controls = JSON.parse(
localStorage.getItem('controls')
) || {

left:'a',
down:'s',
up:'w',
right:'d',
space:' '

};

document.getElementById('key-left').value =
controls.left;

document.getElementById('key-down').value =
controls.down;

document.getElementById('key-up').value =
controls.up;

document.getElementById('key-right').value =
controls.right;

document.getElementById('key-space').value =
controls.space === ' '
? 'space'
: controls.space;

function saveControls(){

controls = {

left:
document
.getElementById('key-left')
.value
.toLowerCase(),

down:
document
.getElementById('key-down')
.value
.toLowerCase(),

up:
document
.getElementById('key-up')
.value
.toLowerCase(),

right:
document
.getElementById('key-right')
.value
.toLowerCase(),

space:
document
.getElementById('key-space')
.value
.toLowerCase() === 'space'
? ' '
: document
.getElementById('key-space')
.value
.toLowerCase()

};

localStorage.setItem(
'controls',
JSON.stringify(controls)
);

alert("Controles salvos!");

}

function updateSongList(){

const category =
document
.getElementById(
'category-select'
)
.value;

const select =
document
.getElementById(
'song-select'
);

select.innerHTML = '';

songDatabase[category]
.forEach(song => {

const option =
document
.createElement('option');

option.value =
song.id;

option.innerText =
song.name;

select.appendChild(option);

});

}

document
.getElementById(
'category-select'
)
.addEventListener(
'change',
updateSongList
);

updateSongList();

function onYouTubeIframeAPIReady(){

player = new YT.Player(

'youtube-player',

{
videoId:'0FCvzsVlXpQ'
}

);

}

function startGame(){

difficulty =
document
.getElementById(
'difficulty-select'
)
.value;

const category =
document
.getElementById(
'category-select'
)
.value;

const songId =
document
.getElementById(
'song-select'
)
.value;

selectedSong =
songDatabase[category]
.find(
s => s.id === songId
);

if(
selectedSong.name ===
"Triple Trouble"
){

difficulty = "extreme";

document
.getElementById(
'rect-space'
)
.style.display =
'block';

}

player.loadVideoById(
selectedSong.id
);

generateChart();

gameRunning = true;

requestAnimationFrame(
updateGame
);

}

function generateChart(){

chart = [];

let lanes = [

'left',
'down',
'up',
'right'

];

if(
difficulty ===
"extreme"
){

lanes.push('space');

}

for(
let i = 0;
i < 450;
i++
){

chart.push({

time:i * 0.28,

lane:
lanes[
Math.floor(
Math.random()
* lanes.length
)
],

hit:false

});

}

}

function updateHealth(){

if(health < 0)
health = 0;

document
.getElementById(
'health-bar'
)
.style.width =
health + '%';

if(health <= 0){

gameRunning = false;

player.pauseVideo();

document
.getElementById(
'game-over'
)
.style.display =
'flex';

}

}

function showJudge(text){

const el =
document
.getElementById(
'judge-text'
);

el.innerText = text;

if(text === 'PERFECT'){

el.style.color =
'#00ff88';

}

else if(
text === 'GOOD'
){

el.style.color =
'#ffff00';

}

else{

el.style.color =
'#ff3333';

}

el.style.opacity = 1;

setTimeout(() => {

el.style.opacity = 0;

},150);

}

function updateGame(){

if(!gameRunning)
return;

visualTime =
player.getCurrentTime();

const SPEED = 850;

const RECEPTOR_Y = 580;

chart.forEach(note => {

if(note.hit)
return;

const pos = {

left:20,
down:120,
up:220,
right:320,
space:420

};

let y =

(
visualTime
- note.time
)

* SPEED

+ RECEPTOR_Y;

if(
y > -100
&& y < 800
&& !note.el
){

note.el =
document
.createElement('div');

note.el.className =
'note';

const colors = {

left:'#00ff00',
down:'#ff0000',
up:'#ffff00',
right:'#0000ff',
space:'#ff8800'

};

note.el.style.background =
colors[note.lane];

note.el.style.boxShadow =
`0 0 20px ${colors[note.lane]}`;

note.el.style.left =
pos[note.lane]
+ 'px';

document
.getElementById(
'game-container'
)
.appendChild(note.el);

}

if(note.el){

note.el.style.top =
y + 'px';

}

if(y > 800){

note.hit = true;

if(note.el){

note.el.remove();

}

health -= 10;

showJudge('MISS');

updateHealth();

}

});

requestAnimationFrame(
updateGame
);

}

window.addEventListener(

'keydown',

(e)=>{

const key =
e.key.toLowerCase();

const lane =

Object
.keys(controls)
.find(

k =>
controls[k]
=== key

);

if(!lane)
return;

document
.getElementById(
'rect-' + lane
)
.classList.add(
'active'
);

chart.forEach(note => {

if(note.hit)
return;

const diff =

Math.abs(
note.time
- visualTime
);

if(

note.lane === lane
&& diff < 0.14

){

note.hit = true;

if(note.el){

note.el.remove();

}

if(diff < 0.05){

health += 2;

showJudge(
'PERFECT'
);

}

else{

health += 1;

showJudge(
'GOOD'
);

}

updateHealth();

}

});

if(!musicStarted){

musicStarted = true;

player.playVideo();

}

}

);

window.addEventListener(

'keyup',

(e)=>{

const key =
e.key.toLowerCase();

const lane =

Object
.keys(controls)
.find(

k =>
controls[k]
=== key

);

if(!lane)
return;

document
.getElementById(
'rect-' + lane
)
.classList.remove(
'active'
);

}

);

</script>

</body>
</html>
