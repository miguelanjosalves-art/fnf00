<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Tenna Boss Fight - Rhythm Engine</title>

    <style>
        body {
            background: #111;
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        #controls-sidebar {
            width: 220px;
            padding: 20px;
            border-right: 2px solid #ff00ff;
        }

        .control-input {
            width: 40px;
            text-align: center;
            background: #222;
            color: #ff00ff;
            border: 1px solid #ff00ff;
            margin-bottom: 10px;
        }

        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            border: 10px solid #ff00ff;
            background: black;
            overflow: hidden;
            margin-left: 20px;
        }

        #countdown {
            position: absolute;
            top: 250px;
            width: 100%;
            text-align: center;
            font-size: 80px;
            color: #ff00ff;
            z-index: 20;
            display: none;
        }

        .receptor {
            width: 60px;
            height: 60px;
            border: 3px solid #ff00ff;
            position: absolute;
            bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .active {
            background: #ff00ff;
            box-shadow: 0 0 20px #ff00ff;
        }

        .note {
            position: absolute;
            width: 60px;
            height: 20px;
            background: #ff00ff;
            border-radius: 4px;
            box-shadow: 0 0 10px #ff00ff;
        }

        button {
            background: #111;
            color: #ff00ff;
            border: 2px solid #ff00ff;
            padding: 10px;
            cursor: pointer;
            font-family: inherit;
        }

        button:hover {
            background: #ff00ff;
            color: black;
        }

        #info {
            margin-top: 20px;
            color: #ff00ff;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div id="controls-sidebar">

        <h2>CONTROLES</h2>

        <label>
            Esquerda:
            <input type="text" id="key-left" class="control-input" value="a">
        </label>
        <br>

        <label>
            Baixo:
            <input type="text" id="key-down" class="control-input" value="s">
        </label>
        <br>

        <label>
            Cima:
            <input type="text" id="key-up" class="control-input" value="w">
        </label>
        <br>

        <label>
            Direita:
            <input type="text" id="key-right" class="control-input" value="d">
        </label>

        <br><br>

        <button onclick="saveControls()">
            SALVAR
        </button>

        <div id="info">
            Acerte a primeira nota para iniciar a música
        </div>

    </div>

    <div id="game-container">

        <div id="countdown">3</div>

        <div class="receptor" id="rect-left" style="left:20px;"></div>
        <div class="receptor" id="rect-down" style="left:120px;"></div>
        <div class="receptor" id="rect-up" style="left:220px;"></div>
        <div class="receptor" id="rect-right" style="left:320px;"></div>

        <button id="start-btn" style="position:absolute; top:300px; left:120px; z-index:30;" onclick="startCountdown()">

            INICIAR BOSS

        </button>

    </div>

    <div id="youtube-player" style="display:none;"></div>

    <script>

        // YOUTUBE API

        const tag = document.createElement('script');

        tag.src = "https://www.youtube.com/iframe_api";

        document.head.appendChild(tag);

        // VARIÁVEIS

        let player;

        let gameRunning = false;

        let musicStarted = false;

        let chart = [];

        let visualTime = 0;

        // CONTROLES

        let controls = JSON.parse(localStorage.getItem('controls')) || {

            left: 'a',
            down: 's',
            up: 'w',
            right: 'd'

        };

        document.getElementById('key-left').value = controls.left;
        document.getElementById('key-down').value = controls.down;
        document.getElementById('key-up').value = controls.up;
        document.getElementById('key-right').value = controls.right;

        // SALVAR

        function saveControls() {

            controls = {

                left: document.getElementById('key-left').value.toLowerCase(),
                down: document.getElementById('key-down').value.toLowerCase(),
                up: document.getElementById('key-up').value.toLowerCase(),
                right: document.getElementById('key-right').value.toLowerCase()

            };

            localStorage.setItem(
                'controls',
                JSON.stringify(controls)
            );

            alert("Controles salvos!");

        }

        // CONTAGEM

        function startCountdown() {

            document.getElementById('start-btn').style.display = 'none';

            const cd = document.getElementById('countdown');

            cd.style.display = 'block';

            let count = 3;

            cd.innerText = count;

            const timer = setInterval(() => {

                count--;

                cd.innerText = count > 0 ? count : "GO!";

                if (count < 0) {

                    clearInterval(timer);

                    cd.style.display = 'none';

                    startGame();

                }

            }, 1000);

        }

        // START

        function startGame() {

            gameRunning = true;

            requestAnimationFrame(updateGame);

        }

        // MAPA MAIS NATURAL

        function generateChart() {

            chart = [];

            const bpm = 128;

            const beat = 60 / bpm;

            const lanes = [
                'left',
                'down',
                'up',
                'right'
            ];

            let lastLane = null;

            // MAIS RÁPIDO
            for (let i = 0.5; i < 170; i += beat / 2) {

                // CHANCE MAIS NATURAL
                if (Math.random() < 0.72) {

                    // ESCOLHE UMA LANE DIFERENTE
                    let lane =
                        lanes[Math.floor(Math.random() * 4)];

                    while (lane === lastLane) {

                        lane =
                            lanes[Math.floor(Math.random() * 4)];

                    }

                    lastLane = lane;

                    // NOTA NORMAL
                    chart.push({

                        time: i,
                        lane: lane,
                        hit: false

                    });

                    // RARAMENTE DUPLA
                    if (Math.random() < 0.10) {

                        let secondLane =
                            lanes[Math.floor(Math.random() * 4)];

                        while (
                            secondLane === lane
                        ) {

                            secondLane =
                                lanes[Math.floor(Math.random() * 4)];

                        }

                        chart.push({

                            time: i,
                            lane: secondLane,
                            hit: false

                        });

                    }

                }

            }

        }

        // YOUTUBE READY

        function onYouTubeIframeAPIReady() {

            player = new YT.Player('youtube-player', {

                videoId: 'F2PJbTuZlTU',

                events: {

                    'onReady': () => {

                        generateChart();

                    }

                }

            });

        }

        // UPDATE

        function updateGame() {

            if (!gameRunning) return;

            // TEMPO VISUAL
            if (!musicStarted) {

                visualTime += 0.018;

            } else {

                visualTime = player.getCurrentTime();

            }

            const currentTime = visualTime;

            // MAIS RÁPIDO
            const SPEED = 500;

            const RECEPTOR_Y = 500;

            chart.forEach(note => {

                if (note.hit) return;

                let y =
                    (currentTime - note.time) * SPEED
                    + RECEPTOR_Y;

                // CRIA
                if (y > -80 && y < 700 && !note.el) {

                    note.el = document.createElement('div');

                    note.el.className = 'note';

                    document
                        .getElementById('game-container')
                        .appendChild(note.el);

                }

                if (note.el) {

                    const pos = {

                        left: 20,
                        down: 120,
                        up: 220,
                        right: 320

                    };

                    note.el.style.left =
                        pos[note.lane] + 'px';

                    note.el.style.top =
                        y + 'px';

                    // REMOVE
                    if (y > 700) {

                        note.el.remove();

                        note.hit = true;

                    }

                }

            });

            requestAnimationFrame(updateGame);

        }

        // INPUT

        window.addEventListener('keydown', (e) => {

            const key = e.key.toLowerCase();

            const lane =
                Object.keys(controls)
                    .find(k => controls[k] === key);

            if (!lane) return;

            // ANIMAÇÃO

            const rect =
                document.getElementById('rect-' + lane);

            rect.classList.add('active');

            setTimeout(() => {

                rect.classList.remove('active');

            }, 100);

            // HIT

            chart.forEach(n => {

                const currentTime = visualTime;

                if (

                    n.lane === lane &&
                    !n.hit &&
                    Math.abs(
                        n.time - currentTime
                    ) < 0.14

                ) {

                    // PRIMEIRO HIT
                    if (!musicStarted) {

                        musicStarted = true;

                        player.playVideo();

                        document.getElementById('info')
                            .innerText = "Música iniciada!";

                    }

                    n.hit = true;

                    if (n.el) {

                        n.el.remove();

                    }

                }

            });

        });

    </script>

</body>

</html>
